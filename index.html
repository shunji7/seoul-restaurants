  .card-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .card-kr { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .badge { font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 6px; white-space: nowrap; }

  .badge-24h { background: #e8f5e9; color: #2e7d32; }

  .card-vibe { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; background: var(--tag-bg); color: #555; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); }
  .card-info { font-size: 11px; color: var(--muted); }
  .card-info span { display: block; }
  .card-info .warn { color: #b45309; }
  .map-btn { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent); text-decoration: none; padding: 6px 10px; border: 1px solid #f0cfc7; border-radius: 8px; transition: background 0.15s; }

  footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); background: var(--surface); }

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5 ? 1 : 0;
  return '★'.repeat(full) + (half ? '½' : '') + ' ' + rating.toFixed(1);
}

function getMapUrl(placeId, name) {
  if (placeId) {
    return `https://www.google.com/maps/place/?q=place_id:${placeId}`;
  }
  return `https://www.google.com/maps/search/${encodeURIComponent(name + ' Seoul')}`;
}

function filterCards(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    const cats = JSON.parse(card.dataset.cats);
    if (cat === 'all' || cats.includes(cat)) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

function buildGrid() {
  const grid = document.getElementById('grid');
  restaurants.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cats = JSON.stringify(r.cat);
    const mapUrl = getMapUrl(r.mapId, r.name);
    const badges = [];
    if (r.michelin) badges.push('<span class="badge badge-michelin">⭐ ミシュラン</span>');
    if (r.h24) badges.push('<span class="badge badge-24h">24時間</span>');
    badges.push(`<span class="badge badge-area">${r.area}</span>`);
    const tagHtml = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
    card.innerHTML = `
      <div class="card-img-placeholder">${r.emoji}</div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-name">${r.name}</div>
            <div class="card-kr">${r.kr}</div>
          </div>
          <div class="badges">${badges.join('')}</div>
        </div>
        <div class="card-genre">${r.genre}</div>
        <div class="card-vibe">${r.vibe}</div>
        <div class="card-tags">${tagHtml}</div>
        <div class="card-footer">
          <div class="card-info">
            <span class="stars">${renderStars(r.rating)}</span>
            <span class="rating-count">(${r.ratingCount.toLocaleString()}件) ${r.budget}</span>
            <span class="${r.hours.includes('休') ? 'warn' : ''}">${r.hours}</span>
          </div>
          <a class="map-btn" href="${mapUrl}" target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 1.5C5.51 1.5 3.5 3.51 3.5 6c0 3.75 4.5 8.5 4.5 8.5s4.5-4.75 4.5-8.5c0-2.49-2.01-4.5-4.5-4.5zm0 6a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/>
            </svg>
            地図
          </a>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}
