function mapUrl(r){
  if(r.pid){
    // モバイル対応: place_id形式ではなくlatLng + query形式を使用
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name+' Seoul')}&query_place_id=${r.pid}`;
  }
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name+' Seoul '+r.area)}`;
}

function stars(n){return '★'.repeat(Math.floor(n))+(n%1>=.5?'½':'')+' '+n.toFixed(1)}

function fc(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c=>{
    const cats=JSON.parse(c.dataset.cats);
    c.style.display=(cat==='all'||cats.includes(cat))?'':'none';
  });
}

function build(){
  const g=document.getElementById('grid');
  R.forEach(r=>{
    const d=document.createElement('div');
    d.className='card';
    d.dataset.cats=JSON.stringify(r.cat);
    const bdgs=[`<span class="bdg ba">${r.area}</span>`];
    if(r.m)bdgs.unshift('<span class="bdg bm">⭐ ミシュラン</span>');
    if(r.h24)bdgs.unshift('<span class="bdg bh">24h</span>');
    const tags=r.tags.map(t=>`<span class="tag">${t}</span>`).join('');
    const warnH=r.hours.includes('休')||r.hours.includes('要確認');
    const url=mapUrl(r);
    d.innerHTML=`
      ${photoGrid(r)}
      <div class="body">
        <div class="top">
          <div><div class="name">${r.name}</div><div class="kr">${r.kr}</div></div>
          <div class="bdgs">${bdgs.join('')}</div>
        </div>
        <div class="genre">${r.genre}</div>
        <div class="vibe">${r.vibe}</div>
        <div class="tags">${tags}</div>
        <div class="foot">
          <div class="info">
            <span class="stars">${stars(r.rating)}</span> <span style="color:#aaa">(${r.rc.toLocaleString()}件)</span><br>
            <span>${r.budget}</span><br>
            <span class="${warnH?'warn':''}">${r.hours}</span>
          </div>
          <a class="mapbtn" href="${url}" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            地図で見る
          </a>
        </div>
      </div>`;
    g.appendChild(d);
  });
}
build();
