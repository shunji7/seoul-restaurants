// Anthropic API経由でClaude に各店舗の写真URLを取得させる
async function fetchPhotosForRestaurant(r) {
  try {
    const prompt = `You are a helpful assistant. For the Korean restaurant "${r.name}" (${r.kr}) in Seoul, search query: "${r.q}", provide exactly 3 real photo URLs from the internet (exterior, interior, and food/dish photos). Return ONLY a JSON array with 3 image URLs that are publicly accessible and show this specific restaurant or its food. Format: ["url1","url2","url3"]. If you cannot find real photos, use high-quality food photos from Unsplash that match the dish type: ${r.genre}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{type: "web_search_20250305", name: "web_search"}],
        messages: [{role: "user", content: prompt}]
      })
    });
    const data = await response.json();
    const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
    const match = text.match(/\[.*?\]/s);
    if (match) return JSON.parse(match[0]);
  } catch(e) {}
  return null;
}

// 写真エリアのHTML生成（初期はプレースホルダー、後で写真に差し替え）
function photoGrid(r, idx) {
  const colors = {"海鮮":"#e8f4f8","焼肉":"#fdf3f0","麺":"#fefbf0","スープ":"#f0fdf4","ホルモン":"#fff3e0","鴨肉":"#f5f0ff","牡蠣":"#e8f4f8","タコ":"#fef3f8"};
  const mainCat = r.tags[0] || "その他";
  const bg = colors[mainCat] || "#f5f3ef";
  const emoji = r.genre.split(' ')[0];
  return `<div class="photos" id="photos-${idx}">
    <div class="p0 photo-ph" id="ph0-${idx}" style="background:${bg}">${emoji}<span>読み込み中...</span></div>
    <div class="p1 photo-ph" id="ph1-${idx}" style="background:${bg}">🏪<span>外観</span></div>
    <div class="p2 photo-ph" id="ph2-${idx}" style="background:${bg}">🍽️<span>料理</span></div>
  </div>`;
}

// 写真を非同期で読み込んでDOMを更新
async function loadPhotos(r, idx) {
  // まずGoogle Maps Street View と Places の静的URLを試みる
  const fallbackUrls = getStaticPhotoUrls(r);
  applyPhotos(idx, fallbackUrls);

  // Claude API経由で写真取得を試みる
  const photos = await fetchPhotosForRestaurant(r);
  if (photos && photos.length >= 2) {
    applyPhotos(idx, photos);
  }
}

function applyPhotos(idx, urls) {
  if (!urls || urls.length === 0) return;
  const slots = ['ph0', 'ph1', 'ph2'];
  const labels = ['料理', '外観', '店内'];
  urls.slice(0, 3).forEach((url, i) => {
    const el = document.getElementById(`${slots[i]}-${idx}`);
    if (!el || !url) return;
    const img = document.createElement('img');
    img.className = 'photo-img';
    img.src = url;
    img.alt = labels[i];
    img.loading = 'lazy';
    img.onerror = () => {}; // エラー時はそのまま
    img.onload = () => { el.replaceWith(img); };
  });
}

function mapUrl(r) {
  if (r.pid) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name+' Seoul')}&query_place_id=${r.pid}`;
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name+' Seoul '+r.area)}`;
}

function stars(n) { return '★'.repeat(Math.floor(n))+(n%1>=.5?'½':'')+' '+n.toFixed(1); }

function fc(cat, btn) {
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    const cats = JSON.parse(c.dataset.cats);
    c.style.display = (cat === 'all' || cats.includes(cat)) ? '' : 'none';
  });
}

async function build() {
  const g = document.getElementById('grid');
  R.forEach((r, idx) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.dataset.cats = JSON.stringify(r.cat);
    const bdgs = [`<span class="bdg ba">${r.area}</span>`];
    if (r.m) bdgs.unshift('<span class="bdg bm">⭐ ミシュラン</span>');
    if (r.h24) bdgs.unshift('<span class="bdg bh">24h</span>');
    const tags = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const warnH = r.hours.includes('休') || r.hours.includes('要確認');
    const url = mapUrl(r);
    d.innerHTML = `
      ${photoGrid(r, idx)}
      <div class="body">
        <div class="top">
          <div><div class="name">${r.name}</div><div class="kr">${r.kr}</div></div>
          <div class="bdgs">${bdgs.join('')}</div>
        </div>
        <div class="genre">${r.genre}</div>
        <div class="vibe">${r.vibe}</div>
        <div class="tags">${tags}</div>
        <div class="foot">
          <div class="info">
            <span class="stars">${stars(r.rating)}</span> <span style="color:#aaa">(${r.rc.toLocaleString()}件)</span><br>
            <span>${r.budget}</span><br>
            <span class="${warnH?'warn':''}">${r.hours}</span>
          </div>
          <a class="mapbtn" href="${url}" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            地図で見る
          </a>
        </div>
      </div>`;
    g.appendChild(d);
  });

  // 写真を順次非同期読み込み（Unsplashフォールバック）
  for (let i = 0; i < R.length; i++) {
    applyPhotos(i, getStaticPhotoUrls(R[i]));
    await new Promise(r => setTimeout(r, 50)); // レンダリングを分散
  }
}
